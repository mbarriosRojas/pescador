name: Validate Stories

on:
  pull_request:
    paths:
      - 'tasks/stories/**/*.yaml'
      - 'tasks/stories/**/*.yml'
      - 'tasks/epics/**/*.yaml'
      - 'tasks/epics/**/*.yml'
  push:
    branches:
      - main
    paths:
      - 'tasks/stories/**/*.yaml'
      - 'tasks/stories/**/*.yml'
      - 'tasks/epics/**/*.yaml'
      - 'tasks/epics/**/*.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Story Files
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/task-manager/package-lock.json

      - name: Install dependencies
        working-directory: scripts/task-manager
        run: npm ci

      - name: Validate all stories
        working-directory: scripts/task-manager
        run: npm run validate

      - name: Comment on PR (if validation fails)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Story validation failed. Please check the workflow logs for details.'
            })

      - name: Comment on PR (if validation succeeds)
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ All stories are valid!'
            })
