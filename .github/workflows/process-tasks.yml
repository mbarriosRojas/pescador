name: Process Tasks and Generate PRs

on:
  workflow_dispatch:
    inputs:
      story_id:
        description: 'Story ID to process (e.g., US-001)'
        required: true
        type: string
      base_branch:
        description: 'Base branch for PR'
        required: false
        default: 'main'
        type: string

jobs:
  generate-pr:
    runs-on: ubuntu-latest
    name: Generate Pull Request
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/task-manager/package-lock.json

      - name: Install dependencies
        working-directory: scripts/task-manager
        run: npm ci

      - name: Validate story
        working-directory: scripts/task-manager
        run: npm run validate ${{ inputs.story_id }}

      - name: Generate PR
        working-directory: scripts/task-manager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run pr ${{ inputs.story_id }} -- --base ${{ inputs.base_branch }}

      - name: Create workflow summary
        run: |
          echo "### PR Generation Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Story ID:** ${{ inputs.story_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Base Branch:** ${{ inputs.base_branch }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the [Pull Requests](https://github.com/${{ github.repository }}/pulls) page for the new PR." >> $GITHUB_STEP_SUMMARY
