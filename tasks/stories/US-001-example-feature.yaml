    status: pending
    estimate: "6h"
  - id: US-001-T4
    title: "Add screen sharing functionality"
    status: pending
    estimate: "4h"
  - id: US-001-T5
    title: "Implement in-call chat"
    status: pending
    estimate: "3h"
  - id: US-001-T6
    title: "Add call recording feature"
    status: pending
    estimate: "5h"
  - id: US-001-T7
