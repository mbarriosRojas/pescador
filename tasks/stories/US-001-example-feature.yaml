# Example User Story - Video Consultation Feature

id: US-001
type: user-story
title: "Implement video consultation feature for patients"
description: |
  As a patient
  I want to have video consultations with doctors
  So that I can receive medical care remotely without traveling

priority: high
status: pending
assignee: null
epic: EPIC-001

labels:
  - frontend
  - backend
  - video
  - telemedicine

acceptance_criteria:
  - Patient can schedule a video consultation from the dashboard
  - Video call connects using WebRTC with audio and video
  - Doctor can share screen to show test results
  - Chat functionality available during the call
  - Call can be recorded with patient consent
  - Consultation notes are saved to patient record

