# Epic Template
# Copy this file to tasks/epics/ and rename with format: EPIC-XXX-short-title.yaml

id: EPIC-XXX
title: ""
description: |
  [High-level description of the epic and its business value]

status: pending   # Options: pending | in-progress | completed | cancelled

# Business context
