  - US-XXX
  - US-XXX

# Success metrics
metrics:
  - metric: ""
    target: ""
    current: ""

# Progress tracking
total_stories: 0
completed_stories: 0
in_progress_stories: 0

notes: ""

# Metadata
created_at: ""
updated_at: ""
